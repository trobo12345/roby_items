<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Lista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div class="container">
            <div class="header">
                <h1 id="title">Roby Scripts</h1>
                <div id="update-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="4" x2="4" y2="15"/></svg>
                    <span id="update-badge-text">Update available</span>
                </div>
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Keresés...">
                </div>
                <button id="close-button" aria-label="Bezárás">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div id="item-list"></div>
            <div id="paginationControls">
                <button id="prevPage" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    <span>Előző</span>
                </button>
                <span id="pageInfo">Oldal 1/1</span>
                <button id="nextPage" disabled>
                    <span>Következő</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Give modal -->
    <div id="give-item-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="give-modal-title">Item Átadása Játékosnak</h2>
            <div class="input-group">
                <label id="give-player-label" for="player-id-input">Játékos ID:</label>
                <input type="number" id="player-id-input" placeholder="Add meg a játékos ID-t" min="1">
            </div>
            <div class="input-group">
                <label id="give-amount-label" for="give-amount-input">Mennyiség:</label>
                <input type="number" id="give-amount-input" placeholder="1" min="1" value="1">
            </div>
            <div class="modal-buttons">
                <button id="cancel-give-button" class="btn-secondary">Mégse</button>
                <button id="confirm-give-button" class="btn-primary">Átadás</button>
            </div>
        </div>
    </div>

    <!-- Retrieve modal -->
    <div id="retrieve-item-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="retrieve-modal-title">Item Lehívása</h2>
            <div class="input-group">
                <label id="retrieve-amount-label" for="retrieve-amount-input">Mennyiség:</label>
                <input type="number" id="retrieve-amount-input" placeholder="1" min="1" value="1">
            </div>
            <div class="modal-buttons">
                <button id="cancel-retrieve-button" class="btn-secondary">Mégse</button>
                <button id="confirm-retrieve-button" class="btn-primary">Lehívás</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
